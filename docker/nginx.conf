server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── SPA fallback — all routes served by index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets aggressively (content-hashed by Vite) ─────────
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Disable caching for the HTML entry-point ──────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires    off;
    }

    # ── Health-check endpoint (used by Docker / load-balancers) ───────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain text/css application/json
                      application/javascript text/javascript
                      image/svg+xml application/font-woff2;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_vary         on;
}
